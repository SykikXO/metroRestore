<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metrolist CSV Export</title>
  <meta name="description" content="Upload your Metrolist backup and download your song library as CSV files." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0d14;
      --surface:  rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.08);
      --text:     #e4e6ed;
      --muted:    #7a7f91;
      --accent:   #6c5ce7;
      --accent-g: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
      --green:    #00cec9;
      --red:      #ff7675;
      --orange:   #fdcb6e;
      --radius:   16px;
      --radius-sm:10px;
      --font:     'Inter', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Animated gradient blob background */
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,.18) 0%, transparent 70%);
      top: -200px; left: -100px;
      animation: drift 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,206,201,.12) 0%, transparent 70%);
      bottom: -150px; right: -80px;
      animation: drift 25s ease-in-out infinite alternate-reverse;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.15); }
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      padding: 48px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
      background: var(--accent-g);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Upload Zone ────────────────────────────────────────── */
    .upload-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      backdrop-filter: blur(12px);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .25s, background .25s, transform .15s;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108,92,231,.06);
      transform: translateY(-2px);
    }
    .upload-zone .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: .7;
    }
    .upload-zone h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .upload-zone .hint {
      color: var(--muted);
      font-size: 13px;
    }
    .upload-zone input { display: none; }

    /* ── Progress Bar ───────────────────────────────────────── */
    .progress-wrap {
      margin-top: 28px;
      display: none;
    }
    .progress-wrap.visible { display: block; }
    .progress-bar-bg {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--surface);
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: var(--accent-g);
      transition: width .4s ease;
    }
    .progress-label {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Error ──────────────────────────────────────────────── */
    .error-msg {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      background: rgba(255,118,117,.08);
      border: 1px solid rgba(255,118,117,.25);
      color: var(--red);
      font-size: 14px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Results ────────────────────────────────────────────── */
    .results {
      margin-top: 36px;
      display: none;
    }
    .results.visible { display: block; }
    .results h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--green);
    }
    .results h3 .check { margin-right: 6px; }

    .card-grid {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      transition: border-color .2s, transform .15s;
    }
    .card:hover {
      border-color: rgba(255,255,255,.15);
      transform: translateY(-1px);
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 600;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-stat {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .card-icon {
      font-size: 22px;
      margin-right: 14px;
      flex-shrink: 0;
    }
    .btn-dl {
      flex-shrink: 0;
      background: var(--accent-g);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn-dl:hover { opacity: .88; transform: scale(1.03); }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      margin-top: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      opacity: .6;
    }

    /* ── Animations ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .results.visible .card {
      animation: fadeUp .4s ease forwards;
      opacity: 0;
    }
    .results.visible .card:nth-child(1) { animation-delay: .05s; }
    .results.visible .card:nth-child(2) { animation-delay: .15s; }
    .results.visible .card:nth-child(3) { animation-delay: .25s; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="logo">Metrolist</div>
      <h1>Backup → CSV Export</h1>
      <p>Upload your <strong>.backup</strong> file and get your liked songs, most-played tracks, and full library as downloadable CSVs.</p>
    </header>

    <!-- Upload -->
    <div class="upload-zone" id="dropZone">
      <div class="icon">📂</div>
      <h2>Drop your .backup file here</h2>
      <p class="hint">or click to browse · max 50 MB</p>
      <input type="file" id="fileInput" accept=".backup" />
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">Uploading…</div>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Results -->
    <div class="results" id="results">
      <h3><span class="check">✅</span>Export complete</h3>
      <div class="card-grid" id="cardGrid"></div>
    </div>

    <footer>Files are auto-deleted after 10 minutes · No data is stored</footer>
  </div>

  <script>
    const dropZone     = document.getElementById('dropZone');
    const fileInput    = document.getElementById('fileInput');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    const progressLabel= document.getElementById('progressLabel');
    const errorMsg     = document.getElementById('errorMsg');
    const results      = document.getElementById('results');
    const cardGrid     = document.getElementById('cardGrid');

    const CARD_META = {
      'liked_songs.csv':  { icon: '❤️', label: 'Liked Songs',   stat: s => `${s} songs you loved` },
      'most_played.csv':  { icon: '🔥', label: 'Most Played',   stat: s => `${s} tracks by play time` },
      'cached_songs.csv': { icon: '💾', label: 'Full Library',   stat: s => `${s} songs total` },
    };

    /* ── Drag & Drop ─────────────────────────────────────── */
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    /* ── Upload logic ────────────────────────────────────── */
    function handleFile(file) {
      // Reset UI
      errorMsg.classList.remove('visible');
      results.classList.remove('visible');
      cardGrid.innerHTML = '';

      // Validate
      if (!file.name.endsWith('.backup')) {
        showError('Please upload a .backup file');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showError('File exceeds 50 MB limit');
        return;
      }

      const formData = new FormData();
      formData.append('backup', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload');

      // Show progress
      progressWrap.classList.add('visible');
      progressBar.style.width = '0%';
      progressLabel.textContent = 'Uploading…';

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          progressBar.style.width = pct + '%';
          if (pct >= 100) progressLabel.textContent = 'Processing…';
        }
      });

      xhr.addEventListener('load', () => {
        progressWrap.classList.remove('visible');
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          showResults(data);
        } else {
          try {
            const err = JSON.parse(xhr.responseText);
            showError(err.error || 'Something went wrong');
          } catch { showError('Upload failed (status ' + xhr.status + ')'); }
        }
      });

      xhr.addEventListener('error', () => {
        progressWrap.classList.remove('visible');
        showError('Network error — please try again');
      });

      xhr.send(formData);
    }

    /* ── UI helpers ───────────────────────────────────────── */
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function showResults(data) {
      cardGrid.innerHTML = '';
      const sid = data.session_id;

      data.files.forEach(name => {
        const meta = CARD_META[name] || { icon: '📄', label: name, stat: s => `${s} rows` };
        const statKey = name.replace('.csv', '');
        const count = data.stats[statKey] || 0;

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <span class="card-icon">${meta.icon}</span>
          <div class="card-info">
            <div class="card-name">${meta.label}</div>
            <div class="card-stat">${meta.stat(count.toLocaleString())}</div>
          </div>
          <button class="btn-dl" onclick="location.href='/download/${sid}/${name}'">Download</button>`;
        cardGrid.appendChild(card);
      });

      results.classList.add('visible');
    }
  </script>
</body>
</html>
